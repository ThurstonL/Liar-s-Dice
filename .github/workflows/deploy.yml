name: Deploy to Mac Mini

on:
  push:
    branches: [main]

jobs:
  deploy:
    # Runs directly on your Mac Mini — no inbound SSH needed
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Restart server
        run: pm2 restart liars-dice
